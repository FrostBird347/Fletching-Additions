<!doctype html>
<html lang="en">
	<head>
		<script>
			let hexFontUrls = [
				"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAQAAAAD+Fb1AAAAE0lEQVR42mP4DwEMDCACgwGWAgDfUhnnMWKuGQAAAABJRU5ErkJggg==",
				"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAQAAAAD+Fb1AAAAE0lEQVQIW2P4DwQMEIDOAEmBmADyMQ3zgUO2PQAAAABJRU5ErkJggg==",
				"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAQAAAAD+Fb1AAAAE0lEQVQIW2P4DwQMMABlwimIJADuNQ3zHKf0LwAAAABJRU5ErkJggg==",
				"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAQAAAAD+Fb1AAAAE0lEQVQIW2P4DwYMEABlQEVgUgBD7hHvC4Bq8AAAAABJRU5ErkJggg==",
				"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAQAAAAD+Fb1AAAAFklEQVQIW2P4/58BAkAMMOc/GCCJAgAAMg3zpTrphwAAAABJRU5ErkJggg==",
				"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAQAAAAD+Fb1AAAAFElEQVR42mP4DwEMDGACAqBMmAgAaMkP8Qmy2VsAAAAASUVORK5CYII=",
				"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAQAAAAD+Fb1AAAAFUlEQVR42mP4/58BAv6DAZgBwXARACwGEe/xKCMCAAAAAElFTkSuQmCC",
				"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAEElEQVQIW2P4jwQYkAHxAgD4dRfpS94NnQAAAABJRU5ErkJggg==",
				"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAQAAAAD+Fb1AAAAFElEQVR42mNgYPgPAmCKAYMBohgAlZwV6z765XoAAAAASUVORK5CYII=",
				"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAQAAAAD+Fb1AAAAFUlEQVR42mP4DwEMDCACxoCKMEBEAOFQGOgWAx0BAAAAAElFTkSuQmCC",
				"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAEklEQVR4AWP4jwoYYAJwmrAKANrLOcei+us1AAAAAElFTkSuQmCC",
				"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAF0lEQVQIW2P4DwUMMADjwAVhKjAEYDoACYEj3bW5lMkAAAAASUVORK5CYII=",
				"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAQAAAAD+Fb1AAAAFElEQVR4XmP4DwEMDCACBFEYYCkAvnMX6da33hoAAAAASUVORK5CYII=",
				"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAFUlEQVR4AWP4DwUMMADmIGhMAQwtAJvgH+EFX/tOAAAAAElFTkSuQmCC",
				"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAQAAAAD+Fb1AAAAFklEQVQI12P4DwYMDAxgggHMgDJhUgBT3hHvRNylVQAAAABJRU5ErkJggg==",
				"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAQAAAAD+Fb1AAAAFElEQVR42mP4DwEMDGACBKB8hAgAiagR7yiHiS0AAAAASUVORK5CYII="
			];
			let hexFontImgs = [];
			for (let i = 0; i < hexFontUrls.length; i++) {
				const img = new Image();
				img.src = hexFontUrls[i];
				hexFontImgs.push(img);
			}
			
			function main() {
				//Item texture
				let cElem = document.body.firstElementChild;
				let cContext = cElem.getContext("2d");
				
				for (let iX = 0; iX < 32; iX++) {
					for (let iY = 0; iY < 32; iY++) {
						let xOffset = iX * 16;
						let yOffset = iY * 16;
						
						switch (iY % 4) {
							case 0:
								cContext.fillStyle = "#ea4335";
								cContext.fillRect(xOffset + 13, yOffset + 15, 3, 1);
								cContext.fillRect(xOffset + 15, yOffset + 13, 1, 3);
								break;
							case 1:
								cContext.fillStyle = "#4285f4";
								cContext.fillRect(xOffset, yOffset + 15, 3, 1);
								cContext.fillRect(xOffset, yOffset + 13, 1, 3);
								xOffset += 8;
								break;
							case 2:
								cContext.fillStyle = "#34a853";
								cContext.fillRect(xOffset + 15, yOffset, 1, 3);
								cContext.fillRect(xOffset + 13, yOffset, 3, 1);
								yOffset += 8;
								break;
							case 3:
								cContext.fillStyle = "#fbbc04";
								cContext.fillRect(xOffset, yOffset, 1, 3);
								cContext.fillRect(xOffset, yOffset, 3, 1);
								xOffset += 8;
								yOffset += 8;
								break;
							default:
								console.error("something is VERY wrong, I don't know how this could ever get triggered");
						}
						
						cContext.fillRect(xOffset, yOffset, 8, 8);
						
						let xPos = iX.toString(16).padStart(2, "0").split("");
						xPos[0] = parseInt(xPos[0], 16);
						xPos[1] = parseInt(xPos[1], 16);
						let yPos = iY.toString(16).padStart(2, "0").split("");
						yPos[0] = parseInt(yPos[0], 16);
						yPos[1] = parseInt(yPos[1], 16);
						
						cContext.drawImage(hexFontImgs[xPos[0]], xOffset, yOffset);
						cContext.drawImage(hexFontImgs[xPos[1]], xOffset + 4, yOffset);
						cContext.globalCompositeOperation = 'difference';
						cContext.drawImage(hexFontImgs[yPos[0]], xOffset, yOffset + 4);
						cContext.drawImage(hexFontImgs[yPos[1]], xOffset + 4, yOffset + 4);
						cContext.globalCompositeOperation = 'source-over';
						
					}
				}
				
				//Entity texture
				cElem = document.getElementById("entityTexture");
				cContext = cElem.getContext("2d");
				
				for (let iY = 0; iY < 16; iY++) {
					for (let iX = 0; (iY < 8 && iX < 20) || (iX < 12); iX++) {
						let xOffset = iX * 40;
						let yOffset = (8 * 5) + (iY - 8) * 9;
						let boxSizes = [[0, 8, 9], [8, 22, 9], [30, 10, 9], [25, 5, 8]];
						let boxColours = ["#ea4335", "#4285f4", "#34a853", "#66a853"];
						let currentIndex = ((iY - 8) * 12) + 160 + iX;
						if (iY < 8) {
							xOffset = iX * 24;
							yOffset = iY * 5;
							boxSizes = [[0, 4, 5], [4, 14, 5], [18, 6, 5], [13, 5, 4]];
							currentIndex = (iY * 20) + iX;
						}
						
						for (let iB = 0; iB < 4; iB++) {
							//Fill in colours
							cContext.fillStyle = boxColours[iB];
							cContext.fillRect(xOffset + boxSizes[iB][0], yOffset, boxSizes[iB][1], boxSizes[iB][2]);
							
							//Add dark tint for odd rows
							if (iY % 2 == 1) {
								cContext.fillStyle = "#00000055";
								cContext.fillRect(xOffset + boxSizes[iB][0], yOffset, boxSizes[iB][1], boxSizes[iB][2]);
							}
							
							//Add darker tint for the stick pixel in the back texture
							//This is only done once per group
							if (iB == 3) {
								cContext.fillStyle = "#00000055";
								if (iY < 8) {
									cContext.fillRect(xOffset + 17, yOffset + 4, 1, 1);
								} else {
									cContext.fillRect(xOffset + 29, yOffset + 8, 1, 1);
								}
							}
							
							let currentIndexHex = currentIndex.toString(16).padStart(2, "0");
							//FullIndex
							cContext.fillStyle = `#${currentIndexHex}${currentIndexHex}${currentIndexHex}`;
							cContext.fillRect(xOffset + boxSizes[iB][0], yOffset, 1, 1);
							//Split - GB
							currentIndexHex = currentIndexHex.split("");
							cContext.fillStyle = `#00${currentIndexHex[0]}${currentIndexHex[0]}${currentIndexHex[1]}${currentIndexHex[1]}`;
							cContext.fillRect(xOffset + boxSizes[iB][0] + 1, yOffset, 1, 1);
							//FullIndex + GB Split above
							let temp = currentIndex.toString(16).padStart(2, "0");
							cContext.fillStyle = `#${temp}${currentIndexHex[0]}${currentIndexHex[0]}${currentIndexHex[1]}${currentIndexHex[1]}`;
							cContext.fillRect(xOffset + boxSizes[iB][0], yOffset + 1, 1, 1);
							//Colour cycle
							let colourCycle = ["black", "gray", "white","maroon", "red", "purple", "fuchsia", "green", "lime", "olive", "yellow", "dodgerblue", "blue", "teal", "aqua"];
							cContext.fillStyle = colourCycle[currentIndex % colourCycle.length];
							cContext.fillRect(xOffset + boxSizes[iB][0] + 1, yOffset + 1, 1, 1);
						}
					}
				}
			}
		</script>
	</head>
	<body onload="main()" style="background-color: slategray;">
		<!-- 16*32 -->
		<canvas id="itemTexture" width="512" height="512" style="image-rendering: pixelated"></canvas>
		<br>
		<!-- (24*20 & 40*12)x(5*8 & 9*8) -->
		<canvas id="entityTexture" width="480" height="112" style="image-rendering: pixelated"></canvas>
	</body>
</html>
